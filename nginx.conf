# Nginx config for Smart Mumbai Solutions
# Frontend: Next.js (port 3000)
# Backend:  Gallery API (port 7001)
# Use with: same domain for both; set NEXT_PUBLIC_GALLERY_API_BASE to https://yourdomain.com/api/gallery

upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream gallery_backend {
    server 127.0.0.1:7001;
    keepalive 32;
}

# Redirect HTTP to HTTPS (uncomment when SSL is ready)
# server {
#     listen 80;
#     server_name yourdomain.com www.yourdomain.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;   # uncomment when using SSL
    server_name yourdomain.com www.yourdomain.com;

    # SSL (uncomment and set paths when using certbot/Let's Encrypt)
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_prefer_server_ciphers on;

    # Logs
    access_log /var/log/nginx/smartmumbai_access.log;
    error_log  /var/log/nginx/smartmumbai_error.log;

    # Max body size (for gallery image uploads)
    client_max_body_size 200M;

    # Gallery API & Admin API -> Node backend (port 7001)
    location /api/ {
        proxy_pass http://gallery_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # Next.js frontend (port 3000)
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js static assets and _next
    location /_next/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /static/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
